<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安安每日信息流</title>
  <style>
    :root { color-scheme: light dark; --bg:#090d18; --bg2:#121827; --card:rgba(255,255,255,.95); --text:#111827; --muted:#6b7280; --line:rgba(148,163,184,.30); --accent:#7c3aed; --cyan:#06b6d4; --green:#16a34a; --yellow:#ca8a04; --red:#dc2626; --shadow:0 18px 50px rgba(2,6,23,.26); }
    @media (prefers-color-scheme:dark) { :root { --card:rgba(15,23,42,.90); --text:#e5e7eb; --muted:#9ca3af; --line:rgba(148,163,184,.22); } }
    * { box-sizing:border-box; } html { scroll-behavior:smooth; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; color:var(--text); line-height:1.62; background:radial-gradient(circle at 18% 0%,rgba(124,58,237,.42),transparent 30%),radial-gradient(circle at 92% 12%,rgba(6,182,212,.30),transparent 30%),radial-gradient(circle at 50% 95%,rgba(249,115,22,.18),transparent 26%),linear-gradient(180deg,var(--bg),var(--bg2)); min-height:100vh; }
    a { color:inherit; text-decoration:none; } a:hover { text-decoration:underline; }
    .page { width:min(1180px,100%); margin:0 auto; padding:14px 12px 52px; }
    .topbar { position:sticky; top:0; z-index:20; display:flex; gap:8px; overflow-x:auto; padding:8px 0 12px; backdrop-filter:blur(18px); }
    .topbar a { flex:0 0 auto; padding:8px 11px; border:1px solid rgba(255,255,255,.18); border-radius:999px; background:rgba(255,255,255,.12); color:#fff; font-size:13px; white-space:nowrap; }
    .hero { position:relative; overflow:hidden; border-radius:30px; padding:26px 18px; color:#fff; border:1px solid rgba(255,255,255,.20); background:linear-gradient(135deg,rgba(124,58,237,.88),rgba(6,182,212,.72)),linear-gradient(45deg,rgba(0,0,0,.4),transparent); box-shadow:var(--shadow); }
    .hero::after { content:""; position:absolute; right:-74px; top:-94px; width:280px; height:280px; border-radius:50%; background:rgba(255,255,255,.16); }
    .eyebrow { margin:0 0 7px; opacity:.9; font-size:14px; }
    h1 { position:relative; margin:0; font-size:clamp(34px,8vw,66px); line-height:1.02; letter-spacing:-1.8px; }
    .summary { position:relative; max-width:850px; margin:12px 0 0; font-size:17px; opacity:.95; }
    .hero-meta { position:relative; display:flex; gap:8px; flex-wrap:wrap; margin-top:16px; }
    .pill { display:inline-flex; align-items:center; gap:5px; border-radius:999px; padding:6px 10px; font-size:12px; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.20); }
    .quick-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:14px; }
    .quick-card { padding:13px; border-radius:18px; background:rgba(255,255,255,.13); border:1px solid rgba(255,255,255,.20); }
    .quick-card b { display:block; font-size:22px; } .quick-card span { font-size:12px; opacity:.85; }
    @media (max-width:820px) { .quick-cards { grid-template-columns:repeat(2,1fr); } }
    .section { margin-top:17px; } .section-title { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:0 2px 10px; color:#fff; } .section-title h2 { margin:0; font-size:22px; } .section-title span { color:rgba(255,255,255,.72); font-size:13px; }
    .panel,.news-card,.compact-card,.source-card { background:var(--card); border:1px solid var(--line); border-radius:22px; box-shadow:0 12px 36px rgba(2,6,23,.20); overflow:hidden; backdrop-filter:blur(18px); }
    .panel,.compact-card,.source-card { padding:16px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; } .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; } .lead-grid { display:grid; grid-template-columns:1.25fr .75fr; gap:14px; } .stack { display:grid; gap:14px; } .source-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    @media (max-width:900px) { .lead-grid,.grid-3,.grid-2,.source-grid { grid-template-columns:1fr; } }
    .media { position:relative; background:linear-gradient(135deg,rgba(124,58,237,.4),rgba(6,182,212,.4)); }
    .news-img { width:100%; height:180px; object-fit:cover; display:block; }
    .lead-card .news-img { height:280px; }
    .fallback { display:none; min-height:180px; place-items:center; padding:20px; color:#fff; text-align:center; background:linear-gradient(135deg,#4f46e5,#06b6d4); }
    .media-failed .news-img { display:none; } .media-failed .fallback { display:grid; }
    .img-source { position:absolute; left:10px; bottom:10px; z-index:2; max-width:calc(100% - 20px); padding:4px 8px; border-radius:999px; color:#fff; background:rgba(0,0,0,.48); backdrop-filter:blur(10px); font-size:12px; }
    .body { padding:14px; } .news-card h3,.compact-card h3,.source-card h3 { margin:0 0 8px; font-size:18px; line-height:1.28; } .lead-card h3 { font-size:clamp(24px,5vw,36px); } p { margin:8px 0; }
    .meta { display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin-bottom:10px; } .badge { display:inline-flex; align-items:center; gap:5px; padding:4px 8px; border-radius:999px; font-size:12px; border:1px solid var(--line); } .grade-a { background:rgba(22,163,74,.12); color:var(--green); } .grade-b { background:rgba(202,138,4,.14); color:var(--yellow); } .grade-c { background:rgba(124,58,237,.12); color:var(--accent); } .category { background:rgba(6,182,212,.12); color:var(--cyan); } .rank { display:inline-flex; width:26px; height:26px; align-items:center; justify-content:center; border-radius:9px; background:var(--accent); color:#fff; font-weight:800; margin-right:6px; } .source-link { color:var(--accent); font-size:13px; }
    .points { padding-left:18px; margin:10px 0; } .points li { margin:5px 0; } details { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; } summary { cursor:pointer; color:var(--accent); font-weight:700; }
    .decision { display:grid; gap:8px; } .decision-row { display:grid; grid-template-columns:82px 1fr; gap:8px; font-size:14px; } .decision-row b { color:var(--muted); } .verdict { display:inline-flex; width:fit-content; padding:6px 10px; border-radius:999px; font-weight:800; background:rgba(22,163,74,.14); color:var(--green); }
    .source-card b { font-size:24px; display:block; } .source-card span { color:var(--muted); font-size:13px; } .source-card strong { display:block; margin-top:6px; }
    .action-list { display:grid; gap:10px; } .action { padding:13px; border-radius:18px; background:color-mix(in srgb,var(--card) 90%,rgba(124,58,237,.20)); border:1px solid var(--line); } .action strong { display:block; margin-bottom:4px; }
    .error { color:#fff; border:1px solid rgba(255,255,255,.25); background:rgba(220,38,38,.28); border-radius:18px; padding:16px; }
    footer { color:rgba(255,255,255,.74); font-size:13px; margin-top:20px; padding:0 4px; }
  </style>
</head>
<body>
  <main class="page">
    <nav class="topbar" aria-label="快速跳转">
      <a href="#headlines">📰 头条</a><a href="#top-stories">🔥 今日必看</a><a href="#do-now">🎁 今日可领</a><a href="#source-mix">🧭 来源组合</a><a href="#ai-tech">🤖 AI/开发</a><a href="#games-community">🎮 游戏雷达</a><a href="#risk-policy">🛡 风险</a><a href="#ignore">🗑 可忽略</a><a href="#actions">✅ 行动</a><a href="#afternoon-update">🌇 下午增量</a>
    </nav>
    <header class="hero" id="hero"><p class="eyebrow">加载中...</p><h1>安安每日信息流</h1><p class="summary">正在读取 data/today.json</p><div class="hero-meta"></div><div class="quick-cards"></div></header>
    <section id="render-root"></section>
    <footer id="footer-note"></footer>
  </main>
<script>
const SECTIONS = [
  ["headlines", "今日国内 / 国际头条", "先看世界发生了什么"],
  ["source-mix", "今日来源组合", "防信息茧房"],
  ["top-stories", "今日必看", "3 条主线，点开看详情"],
  ["do-now", "今日可领 / 可做", "游戏区先解决值不值得"],
  ["ai-tech", "AI / 开发趋势", "只保留和安安强相关"],
  ["games-community", "游戏与社区雷达", "不堆小新闻，只留决策价值"],
  ["risk-policy", "风险提醒", "今天要避开的坑"],
  ["ignore", "今天可忽略", "过滤噪音"],
  ["actions", "今日行动建议", "只保留能做的"],
  ["afternoon-update", "15:30 下午增量更新", "等待自动补充"],
  ["data-review", "数据 Review", "查看 JSON 事实源"]
];
function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function dataPath(){ const d = new URLSearchParams(location.search).get('date'); if(!d) return 'data/today.json'; const [y,m] = d.split('-'); return `archive/${y}/${m}/${d}.json`; }
function imgHtml(card){ const img = card.image || {}; if(!img.url && !img.local_path) return ''; const src = img.local_path || img.url; const target = img.target_url || (card.sources && card.sources[0] && card.sources[0].url) || '#'; return `<a class="media" href="${esc(target)}" target="_blank" rel="noopener"><img class="news-img" src="${esc(src)}" alt="${esc(img.alt || card.title)}" loading="lazy" onerror="this.closest('.media').classList.add('media-failed')"><div class="fallback">图片加载失败，目标链接仍可打开</div><span class="img-source">${esc(img.caption || '关联图')}</span></a>`; }
function metaHtml(card){ const grade = (card.source_grade || 'C').toLowerCase(); const sources = (card.sources || []).map(s => `<a class="source-link" href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)}</a>`).join(''); return `<div class="meta"><span class="badge grade-${esc(grade)}">${esc(card.source_grade || 'C')}级来源</span><span class="badge category">${esc(card.category || card.section || '信息')}</span>${sources}</div>`; }
function detailsHtml(card){ if(!card.details) return ''; return `<details><summary>展开详情</summary><p>${esc(card.details)}</p></details>`; }
function decisionHtml(card){ if(!card.decision) return ''; const rows = Object.entries(card.decision).map(([k,v]) => `<div class="decision-row"><b>${esc(k)}</b><span>${esc(v)}</span></div>`).join(''); const verdict = card.verdict ? `<p><span class="verdict">${esc(card.verdict)}</span></p>` : ''; return `${verdict}<div class="decision">${rows}</div>`; }
function pointsHtml(card){ const items = []; if(card.why_it_matters) items.push(`<li><strong>为什么重要：</strong>${esc(card.why_it_matters)}</li>`); if(card.for_anan) items.push(`<li><strong>安安怎么用：</strong>${esc(card.for_anan)}</li>`); if(card.next_action) items.push(`<li><strong>下一步：</strong>${esc(card.next_action)}</li>`); return items.length ? `<ul class="points">${items.join('')}</ul>` : ''; }
function cardHtml(card, i=0){ const lead = card.priority === 1 || card.layout === 'lead'; const cls = card.type === 'compact' ? 'compact-card' : `news-card ${lead ? 'lead-card' : ''}`; return `<article class="${cls}">${imgHtml(card)}<div class="body">${metaHtml(card)}<h3>${card.priority ? `<span class="rank">${esc(card.priority)}</span>` : ''}${esc(card.title)}</h3><p>${esc(card.summary)}</p>${pointsHtml(card)}${decisionHtml(card)}${detailsHtml(card)}</div></article>`; }
function gridHtml(cards, section){ if(!cards.length) return '<div class="panel"><p>暂无内容。</p></div>'; if(section === 'top-stories' && cards.length >= 3) return `<div class="lead-grid">${cardHtml(cards[0])}<div class="stack">${cards.slice(1,3).map(cardHtml).join('')}</div></div>`; const cls = cards.length === 2 ? 'grid-2' : 'grid-3'; return `<div class="${cls}">${cards.map(cardHtml).join('')}</div>`; }
function sourceMixHtml(items){ if(!items || !items.length) return '<div class="panel"><p>暂无来源组合。</p></div>'; return `<div class="source-grid">${items.map(s => `<div class="source-card"><b>${esc(s.level)}</b><span>${esc(s.type)}</span><strong>${esc((s.sources || []).join('、'))}</strong><p>${esc(s.role || '')}</p></div>`).join('')}</div>`; }
function actionsHtml(actions){ if(!actions || !actions.length) return '<div class="panel"><p>暂无行动建议。</p></div>'; return `<div class="panel action-list">${actions.map((a,i) => `<div class="action"><strong>${i+1}. ${esc(a.title)}</strong>${esc(a.detail)}</div>`).join('')}</div>`; }
function headlinesHtml(cards){ return gridHtml(cards, 'headlines'); }
function render(data){ document.title = `${data.title || '安安每日信息流'}｜${data.date}`; document.querySelector('#hero .eyebrow').textContent = `${data.date} · ${data.status || 'today'} · ${data.data_url || 'data/today.json'}`; document.querySelector('#hero h1').textContent = data.title || '安安每日信息流'; document.querySelector('#hero .summary').textContent = data.summary || '暂无摘要'; document.querySelector('#hero .hero-meta').innerHTML = (data.hero_pills || []).map(x => `<span class="pill">${esc(x)}</span>`).join(''); document.querySelector('#hero .quick-cards').innerHTML = (data.stats || []).map(x => `<div class="quick-card"><b>${esc(x.value)}</b><span>${esc(x.label)}</span></div>`).join('');
  const cards = data.cards || []; const by = Object.groupBy ? Object.groupBy(cards, c => c.section) : cards.reduce((m,c)=>(m[c.section]??=[]).push(c)&&m,{}); const root = document.getElementById('render-root');
  root.innerHTML = SECTIONS.map(([id,title,sub]) => { let body = ''; if(id === 'source-mix') body = sourceMixHtml(data.source_mix); else if(id === 'actions') body = actionsHtml(data.actions); else if(id === 'data-review') body = `<div class="panel"><details><summary>查看当前 JSON 数据</summary><pre style="white-space:pre-wrap;overflow:auto">${esc(JSON.stringify(data,null,2))}</pre></details></div>`; else body = id === 'headlines' ? headlinesHtml(by[id] || []) : gridHtml(by[id] || [], id); return `<section id="${id}" class="section"><div class="section-title"><h2>${title}</h2><span>${sub}</span></div>${body}</section>`; }).join('');
  document.getElementById('footer-note').innerHTML = `<p>数据源：${esc(data.data_url || dataPath())}。归档建议：保存 JSON 到 <code>archive/YYYY/MM/YYYY-MM-DD.json</code>，页面用 <code>?date=YYYY-MM-DD</code> 回看。</p>`;
}
fetch(dataPath(), {cache:'no-store'}).then(r => { if(!r.ok) throw new Error(`${r.status} ${r.statusText}`); return r.json(); }).then(data => { data.data_url = dataPath(); render(data); }).catch(err => { document.getElementById('render-root').innerHTML = `<section class="section"><div class="error"><strong>数据加载失败：</strong>${esc(err.message)}<br>请检查 <code>${esc(dataPath())}</code> 是否存在且 JSON 格式正确。</div></section>`; });
</script>
</body>
</html>
